name: scene3
tilesets:
  - BaseChip_pipo.png
spriteSize: 32
rows: 64
columns: 64
entities:
  - id: 0
    cameraComponent:
      viewport: 0
      max: 0
  - id: 1
    tagComponent:
      name: player
    transformComponent:
      x: 0
      'y': 0
      width: 32
      height: 32
    spriteRendererComponent:
      Layer: 0
      Tileset: 0
      Row: 0
      Column: 0
    materialComponent:
      fillStyle: white
    colliderComponent:
      isTrigger: false
      transform:
        x: 0
        'y': 0
        width: 32
        height: 32
layers:
  - name: Background
    enabled: true
    locked: false
    order: 0
  - name: Default
    enabled: true
    locked: false
    order: 1
  - name: Foreground
    enabled: true
    locked: false
    order: 2
